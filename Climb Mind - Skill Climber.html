<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Climb Mind - Skill Climber</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ui">
    <div id="hud-left">
      <div>高度: <span id="heightDisplay">0</span> m</div>
      <div>ベスト: <span id="bestHeightDisplay">0</span> m</div>
      <div>タイム: <span id="timeDisplay">0.0</span> s</div>
      <div>シード: <span id="seedDisplay"></span></div>
    </div>
    <div id="hud-right">
      <div>精度: <span id="accuracyDisplay">-</span></div>
      <div>安定性: <span id="stabilityDisplay">-</span></div>
      <div>リスク: <span id="riskDisplay">-</span></div>
      <button id="regenButton">同シードでリスタート</button>
    </div>
    <div id="debugPanel">
      <div>DEBUG</div>
      <label>重力: <input id="gravityInput" type="number" step="0.001" /></label>
      <label>摩擦: <input id="frictionInput" type="number" step="0.01" /></label>
      <label>空中制御: <input id="airControlInput" type="number" step="0.01" /></label>
      <label>最大チャージ(ms): <input id="jumpChargeInput" type="number" step="50" /></label>
      <label>当たり表示: <input id="debugCollisionInput" type="checkbox" /></label>
    </div>
    <div id="narrationBox"></div>
    <div id="nearMissBox"></div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script src="main.js"></script>
</body>
</html>
